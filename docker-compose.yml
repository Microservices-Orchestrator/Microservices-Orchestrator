version: "3.8"

services:
  # 1. GATEWAY
  dispatcher-gateway:
    build:
      context: ./src/DispatcherGateway
      dockerfile: Dockerfile
    ports:
      - "5089:8080"
    environment:
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      - redis
    networks:
      - orchestrator-net

  # 2. REDIS
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - orchestrator-net

  # 3. GRAFANA
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    depends_on:
      - redis
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - orchestrator-net

  # 4. MONGODB
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - orchestrator-net

  # 5. AUTH SERVICE
  auth-service:
    build:
      context: ./src/AuthLogService
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=AuthDb
      - JwtSettings__SecretKey=CokGizliVeUzunBirSifreGirin12345!
    ports:
      - "5064:80"
    depends_on:
      - mongodb
    networks:
      - orchestrator-net

  # 6. THREAT SERVICE
  threat-service:
    build:
      context: ./src/ThreatAlertService
      dockerfile: Dockerfile
    container_name: threat-service
    environment:
      - RedisSettings__ConnectionString=redis:6379
    ports:
      - "5065:80"
    depends_on:
      - redis
    networks:
      - orchestrator-net

networks:
  orchestrator-net:
    driver: bridge

volumes:
  redis-data:
  grafana-data:
